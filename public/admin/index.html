<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nirvana Music - Admin Panel</title>
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #16161a;
    --surface-2: #22222b;
    --primary: #6bd2ff;
    --text: #ececec;
    --muted: #9e9e9e;
    --danger: #ff4d6d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
  }
  p.subtitle {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 24px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin: 16px 0 6px;
  }
  input[type="text"], input[type="password"], input[type="email"], input[type="url"], textarea {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  textarea { min-height: 100px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: var(--primary); }
  .row-2 {
    display: flex;
    gap: 12px;
  }
  .row-2 > div { flex: 1; }
  button {
    margin-top: 20px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: #000;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid #444;
    color: var(--text);
    margin-top: 10px;
  }
  button.danger {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    margin-top: 10px;
  }
  #status {
    margin-top: 14px;
    font-size: 13px;
    min-height: 18px;
  }
  #status.ok { color: #6bffb0; }
  #status.err { color: var(--danger); }
  #current-box {
    margin-top: 24px;
    padding: 14px;
    border-radius: 10px;
    background: var(--surface-2);
    font-size: 13px;
    color: var(--muted);
    display: none;
  }
  #current-box.visible { display: block; }
  #current-box b { color: var(--text); }
  #current-box a { color: var(--primary); }
  #gate { text-align: center; }
  .signed-in-as {
    font-size: 12px;
    color: var(--muted);
    margin-top: 0;
  }
</style>
</head>
<body>

  <div class="card" id="gate">
    <h1>Nirvana Music Admin</h1>
    <p class="subtitle">Sign in with your admin account to manage update announcements.</p>
    <label for="email">Admin email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="username" />
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
    <button id="unlock-btn">Sign in</button>
    <div id="status"></div>
  </div>

  <div class="card" id="panel" style="display:none;">
    <h1>Send an Announcement</h1>
    <p class="subtitle">Shown to users as a popup (once/day) and always visible under Settings &rarr; What's New.</p>
    <p class="signed-in-as" id="signed-in-as"></p>

    <label for="title">Title</label>
    <input type="text" id="title" placeholder="e.g. New update available!" />

    <label for="version">New version (optional)</label>
    <input type="text" id="version" placeholder="e.g. 2.1.0" />

    <label for="message">Message</label>
    <textarea id="message" placeholder="What's new? What do you want to tell your users?"></textarea>

    <label for="link">Website / download link (optional)</label>
    <input type="url" id="link" placeholder="https://your-website.com" />

    <button id="send-btn">Send Announcement</button>
    <button id="deactivate-btn" class="danger">Deactivate current announcement</button>
    <button id="lock-btn" class="secondary">Sign out</button>

    <div id="status"></div>

    <div id="current-box">
      <div><b>Current live announcement:</b></div>
      <div id="current-title"></div>
      <div id="current-message"></div>
      <div id="current-link"></div>
      <div id="current-meta"></div>
    </div>
  </div>

  <!-- Firebase (compat build - simplest for a single static HTML file, no bundler needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>

  <script>
    // ---------------------------------------------------------------------
    // Firebase config - values taken from this project's app/google-services.json.
    // A Firebase Web API key is NOT a secret (it just identifies the
    // project to Google's servers); actual write access is controlled by
    // the Realtime Database security rules (see public/admin/README.md),
    // not by hiding this key.
    // ---------------------------------------------------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyAsf_lg8Mqh9Fcya5qEwEJ1zI67Tv1DAAM",
      databaseURL: "https://nirvanamusic-75348-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nirvanamusic-75348",
      storageBucket: "nirvanamusic-75348.firebasestorage.app",
      messagingSenderId: "645739166879",
      appId: "1:645739166879:android:ff1dd080d4241f6745f6aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // ---------------------------------------------------------------------
    // REAL admin login: this signs in with a genuine Firebase Auth
    // email/password account (created once by you in the Firebase Console
    // -> Authentication -> Users -> Add user). Only someone with that
    // account's email + password can sign in here at all, and the
    // database rules (see README) only grant write access to that
    // specific account's UID - so even a stranger who finds this page's
    // source code cannot send announcements without those real
    // credentials. This replaces the old client-side hardcoded password.
    // ---------------------------------------------------------------------

    const gateEl = document.getElementById("gate");
    const panelEl = document.getElementById("panel");
    const statusEls = document.querySelectorAll("#status");

    function setStatus(el, msg, kind) {
      el.textContent = msg;
      el.className = kind || "";
    }

    // If a session is already active (e.g. page refresh), skip straight to the panel.
    auth.onAuthStateChanged((user) => {
      if (user) {
        gateEl.style.display = "none";
        panelEl.style.display = "block";
        document.getElementById("signed-in-as").textContent = "Signed in as " + user.email;
        loadCurrentAnnouncement();
      } else {
        gateEl.style.display = "block";
        panelEl.style.display = "none";
      }
    });

    document.getElementById("unlock-btn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const pw = document.getElementById("password").value;
      const statusEl = gateEl.querySelector("#status");

      if (!email || !pw) {
        setStatus(statusEl, "Enter your admin email and password.", "err");
        return;
      }

      try {
        await auth.signInWithEmailAndPassword(email, pw);
        document.getElementById("password").value = "";
        setStatus(statusEl, "", "");
      } catch (e) {
        setStatus(statusEl, "Sign-in failed: " + e.message, "err");
      }
    });

    document.getElementById("lock-btn").addEventListener("click", async () => {
      await auth.signOut();
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
    });

    async function loadCurrentAnnouncement() {
      const box = document.getElementById("current-box");
      const snap = await db.ref("announcements/current").get();
      if (!snap.exists()) {
        box.classList.remove("visible");
        return;
      }
      const data = snap.val();
      const versionSuffix = data.version ? " (v" + escapeHtml(data.version) + ")" : "";
      document.getElementById("current-title").innerHTML = "<b>" + escapeHtml(data.title || "") + versionSuffix + "</b>";
      document.getElementById("current-message").textContent = data.message || "";
      const linkEl = document.getElementById("current-link");
      if (data.link) {
        linkEl.innerHTML = "Link: <a href=\"" + escapeHtml(data.link) + "\" target=\"_blank\" rel=\"noopener\">" + escapeHtml(data.link) + "</a>";
      } else {
        linkEl.textContent = "";
      }
      const when = data.updatedAt ? new Date(data.updatedAt).toLocaleString() : "unknown time";
      document.getElementById("current-meta").textContent =
        (data.active ? "Active" : "Inactive") + " - updated " + when;
      box.classList.add("visible");
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    document.getElementById("send-btn").addEventListener("click", async () => {
      const statusEl = panelEl.querySelector("#status");
      const title = document.getElementById("title").value.trim();
      const version = document.getElementById("version").value.trim();
      const message = document.getElementById("message").value.trim();
      const link = document.getElementById("link").value.trim();

      if (!message) {
        setStatus(statusEl, "Message can't be empty.", "err");
        return;
      }
      if (link && !/^https?:\/\//i.test(link)) {
        setStatus(statusEl, "Link must start with http:// or https://", "err");
        return;
      }

      try {
        const id = db.ref("announcements/history").push().key;
        const payload = {
          id: id,
          title: title || "Announcement",
          version: version,
          message: message,
          link: link,
          active: true,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        };
        // Write to /current (what the app reads) and keep a copy under
        // /history (for the admin panel's own record - the app never
        // reads this path).
        await db.ref("announcements/current").set(payload);
        await db.ref("announcements/history/" + id).set(payload);

        setStatus(statusEl, "Announcement sent! It'll show in the app within one day (or right away under Settings -> What's New).", "ok");
        document.getElementById("title").value = "";
        document.getElementById("version").value = "";
        document.getElementById("message").value = "";
        document.getElementById("link").value = "";
        loadCurrentAnnouncement();
      } catch (e) {
        setStatus(statusEl, "Failed to send: " + e.message, "err");
      }
    });

    document.getElementById("deactivate-btn").addEventListener("click", async () => {
      const statusEl = panelEl.querySelector("#status");
      try {
        await db.ref("announcements/current/active").set(false);
        setStatus(statusEl, "Current announcement deactivated.", "ok");
        loadCurrentAnnouncement();
      } catch (e) {
        setStatus(statusEl, "Failed: " + e.message, "err");
      }
    });
  </script>
</body>
</html>
